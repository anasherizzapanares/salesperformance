 },[]);

 },[]);

  // YTD helpers — always Jan through curMon

  function ytdAAdj(n,a){ return ytdMonths.reduce(function(s,m){ return s+((data[n]&&data[n][a]&&data[n][a][m])?data[n][a][m].A:0); },0); }
  function ytdTAdj(n,a){ return ytdMonths.reduce(function(s,m){ return s+((data[n]&&data[n][a]&&data[n][a][m])?data[n][a][m].T:0); },0); }
  function monA(n){ return (data[n]&&data[n].MRR[curMon])?data[n].MRR[curMon].A:0; }

  function repSum(n){
    var r={};

  function setTarget(rep,a,mon,val){

      save({data:nd});return nd;

  function addRep(){

                      <div style={{textAlign:"center"}}><div style={{fontSize:10,color:"#4A7C59",marginBottom:2}}>TARGET</div><div style={{fontWeight:700,fontSize:12,color:"#092903"}}>{fmtK(T)}</div></div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:10,color:"#4A7C59",marginBottom:2}}>ACTUAL</div><div style={{fontWeight:700,fontSize:12,color:"#32CE13"}}>{fmtK(A)}</div></div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:10,color:"#4A7C59",marginBottom:2}}>ATTAINMENT</div><div style={{fontWeight:700,fontSize:16,color:aC(tp)}}>{tp.toFixed(1)+"%"}</div></div>
                    </div>
                    {sorted.map(function(r){
                      return <div key={r.n} style={{marginBottom:8,opacity:r.s?0.45:1}}>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                          <span style={{fontWeight:500,color:"#092903"}}>{r.n.split(" ")[0]}<Badge s={r.s}/></span>
                          <span style={{fontWeight:700,color:r.s?"#94a3b8":aC(r.all.p)}}>{r.all.p.toFixed(1)+"%"}</span>
                        </div>
                        <div style={{background:"#E1F6C8",borderRadius:3,height:7}}>
                          <div style={{width:Math.min(r.all.p,100)+"%",background:r.s?"#cbd5e1":aC(r.all.p),borderRadius:3,height:7}}/>
                        </div>
                      </div>;
                    })}
                    {sums.length>1&&(
                      <div style={{marginTop:10,display:"flex",gap:6,fontSize:11}}>
                        <span style={{background:"#E9FAE5",color:"#239A0D",padding:"2px 8px",borderRadius:20}}>🔝 {sums[0].n.split(" ")[0]}</span>
                        <span style={{background:"#fee2e2",color:"#dc2626",padding:"2px 8px",borderRadius:20}}>📉 {sums[sums.length-1].n.split(" ")[0]}</span>
                      </div>
                    )}
                  </div>
                </div>;
              })}
            </div>
          </div>
        )}

        {/* TAB 5: ACCELERATOR */}
        {tab===5&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <b style={{color:"#092903",fontSize:15}}>⚡ Accelerator — Monthly Hit Tracker</b>
              <div style={{display:"flex",gap:10,fontSize:11,color:"#4A7C59"}}>
                <span>Click to cycle:</span>
                <span style={{color:"#94a3b8",fontWeight:600}}>— blank</span>
                <span style={{color:"#32CE13",fontWeight:600}}>✔ hit</span>
                <span style={{color:"#dc2626",fontWeight:600}}>✘ missed</span>
              </div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={TBLS}>
                <thead><tr style={{background:"#092903",color:"#fff"}}>
                  <th style={{padding:"9px 10px",textAlign:"left",minWidth:80}}>Segment</th>
                  <th style={{padding:"9px 12px",textAlign:"left",minWidth:155}}>Rep</th>
                  {MONTHS.map(function(m,i){return <th key={m} style={{padding:"9px 6px",textAlign:"center",minWidth:55,opacity:i>mi?0.4:1}}>{m}</th>;})}
                  <th style={{padding:"9px 8px",textAlign:"center",minWidth:58}}>Total ✔</th>
                </tr></thead>
                <tbody>{activeReps.map(function(r,i){
                  var bg=i%2===0?"#fff":"#F7F9ED";
                  var hits=MONTHS.filter(function(m){return accel[r.n]&&accel[r.n][m]===true;}).length;
                  return <tr key={r.n} style={{background:bg,borderBottom:"1px solid #E1F6C8"}}>
                    <td style={{padding:"8px 10px",color:"#4A7C59",fontSize:11,fontWeight:600}}>{SEGMAP[r.t]||r.t}</td>
                    <td style={{padding:"8px 12px",fontWeight:600,color:"#092903"}}>{r.n}</td>
                    {MONTHS.map(function(m,mi2){
                      var val=accel[r.n]?accel[r.n][m]:null;
                      return <td key={m} style={{padding:"3px 3px",textAlign:"center",opacity:mi2>mi?0.4:1}}>
                        <button onClick={function(){if(unlocked)toggleAccel(r.n,m);}} style={{width:32,height:28,borderRadius:6,border:"none",cursor:unlocked?"pointer":"default",fontSize:14,fontWeight:700,background:val===true?"#E9FAE5":val===false?"#fee2e2":"#F7F9ED",color:val===true?"#32CE13":val===false?"#dc2626":"#94a3b8",opacity:unlocked?1:0.7}}>{val===true?"✔":val===false?"✘":"—"}</button>
                      </td>;
                    })}
                    <td style={{padding:"8px",textAlign:"center",fontWeight:700,color:hits>0?"#32CE13":"#94a3b8",fontSize:14}}>{hits}</td>
                  </tr>;
                })}</tbody>
              </table>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
