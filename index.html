}

function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  var abs = Math.abs(n);
  var s = abs >= 1000000 ? (abs/1000000).toFixed(1)+'M' : abs >= 1000 ? Math.round(abs/1000)+'K' : String(abs);
  return (n < 0 ? '-' : '') + '₱' + s;
}
function fmtK(n) {
  if (!n && n !== 0) return '—';
  return '₱' + (Math.abs(n)>=1000 ? Math.round(n/1000)+'K' : n);
}

function emptyRep() {
  var d = {};
  ADJ.forEach(function(a){ d[a]={}; MONTHS.forEach(function(m){ d[a][m]={T:0,A:0}; }); });
  return d;
}

function buildData() {
  var d = {};
  INIT_REPS.forEach(function(r){ d[r.n]=emptyRep(); });
  return d;
}

function monA(repName, data) {
  if (!data || !data[repName]) return 0;
  var mrrData = data[repName]['MRR'];
  if (!mrrData) return 0;
  return MONTHS.reduce(function(s,m){ return s+(mrrData[m]?mrrData[m].A:0); },0);
}

function ytdA(repName, data, upToMonth) {
  if (!data || !data[repName]) return 0;
  var mrrData = data[repName]['MRR'];
  if (!mrrData) return 0;
  var idx = MONTHS.indexOf(upToMonth);
  if (idx < 0) return 0;
  return MONTHS.slice(0, idx+1).reduce(function(s,m){ return s+(mrrData[m]?mrrData[m].A:0); },0);
}

function ytdT(repName, upToMonth) {
  var rep = INIT_REPS.find(function(r){return r.n===repName;});
  if (!rep) return 0;
  var q = QUOTAS[rep.t];
  if (!q||!q.MRR) return 0;
  var idx = MONTHS.indexOf(upToMonth);
  if (idx < 0) return 0;
  return MONTHS.slice(0, idx+1).reduce(function(s,m){ return s+(q.MRR[m]||0); },0);
}

                React.createElement('div',{style:{flex:1,fontWeight:500,fontSize:12,color:H}},r.n),
                React.createElement('div',{style:{fontSize:12,color:'#6b7280',marginRight:16}},fmtK(rA)+' / '+fmtK(rT)),
                React.createElement(Chip,{p:rP})
              );
            })
          )
        );
      })
    );
  }

  // ---- ACCELERATOR TAB ----
  function renderAccelerator() {
    return React.createElement('div',{style:{padding:'16px',overflowX:'auto'}},
      React.createElement('h2',{style:{fontSize:16,fontWeight:700,marginBottom:16,color:H}},'⚡ Accelerator – Monthly Hit/Miss'),
      React.createElement('div',{style:{overflowX:'auto'}},
        React.createElement('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12}},
          React.createElement('thead',null,
            React.createElement('tr',null,
              React.createElement('th',{style:THS({textAlign:'left',position:'sticky',left:0,zIndex:2})},'Rep'),
              MONTHS.map(function(m){
                var isFuture=MONTHS.indexOf(m)>selMonthIdx;
                return React.createElement('th',{key:m,style:THS({textAlign:'center',opacity:isFuture?0.5:1})},m);
              }),
              React.createElement('th',{style:THS({textAlign:'center'})},'Hits'),
              React.createElement('th',{style:THS({textAlign:'center'})},'%')
            )
          ),
          React.createElement('tbody',null,
            activeReps.map(function(r,i){
              var bg = rowBg(i,false);
              var hits = 0;
              var months2 = MONTHS.slice(0, selMonthIdx+1);
              months2.forEach(function(m){
                var rep2 = reps.find(function(x){return x.n===r.n;});
                if (!rep2) return;
                var q = QUOTAS[rep2.t];
                var target = q&&q.MRR&&q.MRR[m]?q.MRR[m]:0;
                var actual = data[r.n]&&data[r.n]['MRR']&&data[r.n]['MRR'][m]?data[r.n]['MRR'][m].A:0;
                if (target>0&&actual>=target) hits++;
              });
              var hitPct = months2.length>0?pct(hits,months2.length):0;
              return React.createElement('tr',{key:r.n,style:{background:bg}},
                React.createElement('td',{style:{padding:'8px 10px',fontWeight:600,position:'sticky',left:0,background:bg,whiteSpace:'nowrap'}},r.n),
                MONTHS.map(function(m){
                  var isFuture=MONTHS.indexOf(m)>selMonthIdx;
                  if (isFuture) return React.createElement('td',{key:m,style:{padding:'6px',textAlign:'center',color:'#9ca3af'}},'—');
                  var rep2=reps.find(function(x){return x.n===r.n;});
                  var q=rep2&&QUOTAS[rep2.t];
                  var target=q&&q.MRR&&q.MRR[m]?q.MRR[m]:0;
                  var actual=data[r.n]&&data[r.n]['MRR']&&data[r.n]['MRR'][m]?data[r.n]['MRR'][m].A:0;
                  var hit=target>0&&actual>=target;
                  return React.createElement('td',{key:m,style:{padding:'6px',textAlign:'center'}},
                    target>0?React.createElement('span',{style:{display:'inline-block',width:24,height:24,borderRadius:'50%',background:hit?G:'#fee2e2',border:'2px solid '+(hit?'#166534':'#dc2626'),lineHeight:'20px',fontSize:12,fontWeight:700,color:hit?H:'#dc2626'}},hit?'✓':'✗')
                    :React.createElement('span',{style:{color:'#9ca3af'}},'—')
                  );
                }),
                React.createElement('td',{style:{padding:'6px',textAlign:'center',fontWeight:700}},hits+'/'+months2.length),
                React.createElement('td',{style:{padding:'6px',textAlign:'center'}},React.createElement(Chip,{p:hitPct}))
              );
            })
          )
        )
      )
    );
  }

  function renderContent() {
    if (tab==='Segment') return renderSegment();
    if (tab==='Rep Summary') return renderRepSummary();
    if (tab==='Data Entry') return renderDataEntry();
    if (tab==='Leaderboard') return renderLeaderboard();
    if (tab==='Teams') return renderTeams();
    if (tab==='Accelerator') return renderAccelerator();
    return null;
  }

  return React.createElement('div',{style:{minHeight:'100vh',background:'#F7F9ED'}},
    renderHeader(),
    renderTabs(),
    React.createElement('div',{style:{minHeight:'calc(100vh - 120px)'}},renderContent()),
    renderPasswordModal(),
    renderRepEditModal()
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
