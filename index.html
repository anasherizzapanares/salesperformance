                    <td style={{padding:"7px 8px",textAlign:"right",color:"#2563eb",fontWeight:600}}>{fmt(mA)}</td>
                    <td style={{padding:"7px 8px",textAlign:"right",fontWeight:600,color:fToGo>=0?"#16a34a":"#dc2626"}}>{(fToGo>=0?"+":"")+fmt(fToGo)}</td>
                    <td style={{padding:"7px 8px",textAlign:"center"}}>{fAcc!==null?<Chip p={fAcc}/>:"—"}</td>
                    <td style={{padding:"7px 8px",textAlign:"center"}}><input type="checkbox" checked={meta[r.n]?meta[r.n].ef:false} onChange={function(e){setMetaF(r.n,"ef",e.target.checked);}} style={{width:15,height:15,cursor:"pointer",accentColor:"#16a34a"}}/></td>
                    <td style={{padding:"4px 6px",textAlign:"center"}}><input type="number" min="0" value={meta[r.n]?meta[r.n].nl:0} onChange={function(e){setMetaF(r.n,"nl",Number(e.target.value)||0);}} style={{width:42,padding:"2px 4px",fontSize:12,border:"1px solid #cbd5e1",borderRadius:4,textAlign:"center"}}/></td>
                    <td style={{padding:"7px 8px",textAlign:"center"}}><input type="checkbox" checked={meta[r.n]?meta[r.n].mq:false} onChange={function(e){setMetaF(r.n,"mq",e.target.checked);}} style={{width:15,height:15,cursor:"pointer",accentColor:"#16a34a"}}/></td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </div>}

        {tab===2&&<div>
          <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
            <select value={selTeam} onChange={function(e){setSelTeam(e.target.value);}} style={{padding:"6px 10px",borderRadius:6,border:"1px solid #cbd5e1",fontSize:13}}>{TEAMS.map(function(t){return <option key={t}>{t}</option>;})}</select>
            <select value={selAdj} onChange={function(e){setSelAdj(e.target.value);}} style={{padding:"6px 10px",borderRadius:6,border:"1px solid #cbd5e1",fontSize:13}}>{ADJ.map(function(a){return <option key={a}>{a}</option>;})}</select>
            <span style={{fontSize:12,color:"#94a3b8"}}>Click Actual to edit</span>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",width:"100%",background:"#fff",borderRadius:8,boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>
              <thead><tr style={{background:TCOL[selTeam]||"#1e3a8a",color:"#fff"}}>
                <th style={{padding:"8px 12px",textAlign:"left",minWidth:155}}>Rep</th>
                <th style={{padding:"8px 6px",textAlign:"center",width:48}}>Row</th>
                {MONTHS.map(function(m){return <th key={m} style={{padding:"8px 5px",textAlign:"right",minWidth:68}}>{m}</th>;})}
                <th style={{padding:"8px 8px",textAlign:"right",minWidth:88}}>Total</th>
                <th style={{padding:"8px 8px",textAlign:"center",minWidth:65}}>Ach%</th>
              </tr></thead>
              <tbody>{reps.filter(function(r){return r.t===selTeam;}).map(function(r,ri){
                var off=!!r.s;
                var totT=MONTHS.reduce(function(s,m){return s+(data[r.n]&&data[r.n][selAdj]&&data[r.n][selAdj][m]?data[r.n][selAdj][m].T:0);},0);
                var totA=MONTHS.reduce(function(s,m){return s+(data[r.n]&&data[r.n][selAdj]&&data[r.n][selAdj][m]?data[r.n][selAdj][m].A:0);},0);
                var ap=pct(totA,totT),bg=off?"#fff8f0":ri%2===0?"#f8fafc":"#fff";
                return [
                  <tr key={r.n+"T"} style={{background:bg,opacity:off?0.7:1}}>
                    <td style={{padding:"5px 12px",fontWeight:600,borderTop:"2px solid #e2e8f0"}} rowSpan={3}><div style={{display:"flex",alignItems:"center",gap:5}}>{r.n}<Badge s={r.s}/></div></td>
                    <td style={{padding:"5px 5px",color:"#94a3b8",fontSize:11,borderTop:"2px solid #e2e8f0"}}>Target</td>
                    {MONTHS.map(function(m){return <td key={m} style={{padding:"5px 5px",textAlign:"right",borderTop:"2px solid #e2e8f0",fontSize:12}}>{fmt(data[r.n]&&data[r.n][selAdj]&&data[r.n][selAdj][m]?data[r.n][selAdj][m].T:0)}</td>;})}
                    <td style={{padding:"5px 8px",textAlign:"right",fontWeight:600,borderTop:"2px solid #e2e8f0"}}>{fmt(totT)}</td>
                    <td rowSpan={3} style={{padding:"5px 8px",textAlign:"center",fontWeight:700,fontSize:13,borderTop:"2px solid #e2e8f0",color:aC(ap),background:aBg(ap)}}>{ap.toFixed(1)+"%"}</td>
                  </tr>,
                  <tr key={r.n+"A"} style={{background:off?"#fff3e0":ri%2===0?"#eff6ff":"#f0f9ff",opacity:off?0.7:1}}>
                    <td style={{padding:"5px 5px",color:"#2563eb",fontSize:11,fontWeight:600}}>Actual</td>
                    {MONTHS.map(function(m){
                      var cid=r.n+"-"+selAdj+"-"+m;
                      var val=data[r.n]&&data[r.n][selAdj]&&data[r.n][selAdj][m]?data[r.n][selAdj][m].A:0;
                      return <td key={m} style={{padding:"2px 3px",textAlign:"right"}}>{editId===cid?<input autoFocus type="number" defaultValue={val} onBlur={function(e){setActual(r.n,selAdj,m,e.target.value);setEditId(null);}} onKeyDown={function(e){if(e.key==="Enter"){setActual(r.n,selAdj,m,e.target.value);setEditId(null);}}} style={{width:60,padding:"2px 3px",fontSize:11,border:"2px solid #2563eb",borderRadius:3,textAlign:"right"}}/>:<span onClick={function(){setEditId(cid);}} style={{cursor:"pointer",display:"block",padding:"3px 5px",borderRadius:3,fontSize:12,color:val>0?"#1d4ed8":"#94a3b8",background:val>0?"#dbeafe":"transparent"}}>{fmt(val)}</span>}</td>;
                    })}
                    <td style={{padding:"5px 8px",textAlign:"right",fontWeight:600,color:"#1d4ed8"}}>{fmt(totA)}</td>
                  </tr>,
                  <tr key={r.n+"P"} style={{background:bg,opacity:off?0.7:1}}>
                    <td style={{padding:"3px 5px",color:"#94a3b8",fontSize:11}}>Ach%</td>
                    {MONTHS.map(function(m){
                      var T=data[r.n]&&data[r.n][selAdj]&&data[r.n][selAdj][m]?data[r.n][selAdj][m].T:0;
                      var A=data[r.n]&&data[r.n][selAdj]&&data[r.n][selAdj][m]?data[r.n][selAdj][m].A:0;
                      var p=pct(A,T);
                      return <td key={m} style={{padding:"3px 5px",textAlign:"right",fontSize:11,fontWeight:600,color:T>0?aC(p):"#94a3b8"}}>{T>0?p.toFixed(1)+"%":"—"}</td>;
                    })}
                    <td style={{padding:"3px 8px",textAlign:"right",fontSize:11,fontWeight:600,color:aC(ap)}}>{ap.toFixed(1)+"%"}</td>
                  </tr>
                ];
              })}</tbody>
            </table>
          </div>
        </div>}

        {tab===3&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <b style={{color:"#1e3a8a",fontSize:15}}>🏆 Leaderboard — ranked by YTD Att%</b>
            <label style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#64748b",cursor:"pointer"}}><input type="checkbox" checked={showInactive} onChange={function(e){setShowInactive(e.target.checked);}}/> Show inactive</label>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",width:"100%",background:"#fff",borderRadius:8,boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>
              <thead><tr style={{background:"#1e3a8a",color:"#fff"}}>
                <th style={{padding:"8px 8px",textAlign:"center",width:36}}>#</th>
                <th style={{padding:"8px 10px",textAlign:"left",minWidth:140}}>Rep</th>
                <th style={{padding:"8px 8px",textAlign:"left",minWidth:120}}>Team</th>
                <th style={{padding:"8px 8px",textAlign:"right",minWidth:90}}>MRR Ach%</th>
                <th style={{padding:"8px 8px",textAlign:"right",minWidth:90}}>E/F Ach%</th>
                <th style={{padding:"8px 8px",textAlign:"right",minWidth:90}}>YTD Won</th>
                <th style={{padding:"8px 8px",textAlign:"center",minWidth:80}}>YTD Att%</th>
              </tr></thead>
              <tbody>{lbReps.map(function(r,i){return <tr key={r.n} style={{background:r.s?"#fff8f0":i===0?"#fefce8":i%2===0?"#f8fafc":"#fff",borderBottom:"1px solid #e2e8f0",opacity:r.s?0.7:1}}>
                <td style={{padding:"7px 8px",textAlign:"center",fontWeight:700,color:r.s?"#94a3b8":i===0?"#ca8a04":i===1?"#94a3b8":i===2?"#b45309":"#374151"}}>{r.s?"—":i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</td>
                <td style={{padding:"7px 10px"}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontWeight:600}}>{r.n}</span><Badge s={r.s}/></div></td>
                <td style={{padding:"7px 8px"}}><span style={{background:(TCOL[r.t]||"#1e3a8a")+"18",color:TCOL[r.t]||"#1e3a8a",padding:"2px 7px",borderRadius:20,fontSize:11,fontWeight:600}}>{r.t}</span></td>
                <td style={{padding:"7px 8px",textAlign:"right",fontWeight:600,color:aC(r.MRR.p)}}>{r.MRR.p.toFixed(1)+"%"}</td>
                <td style={{padding:"7px 8px",textAlign:"right",fontWeight:600,color:aC(r["E/F"].p)}}>{r["E/F"].p.toFixed(1)+"%"}</td>
                <td style={{padding:"7px 8px",textAlign:"right",fontWeight:600}}>{fmt(ytdA(r.n))}</td>
                <td style={{padding:"7px 8px",textAlign:"center"}}><Chip p={r.ytdP}/></td>
              </tr>;})}</tbody>
            </table>
          </div>
          <div style={{marginTop:8,fontSize:11,color:"#94a3b8"}}>🟢 ≥100% · 🔵 80–99% · 🟠 60–79% · 🔴 &lt;60%</div>
        </div>}

        {tab===4&&<div>
          <b style={{color:"#1e3a8a",fontSize:15,display:"block",marginBottom:14}}>👥 Team Dashboard</b>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
            {TEAMS.map(function(tm){
              var tmReps=reps.filter(function(r){return r.t===tm;});
              if(!tmReps.length)return null;
              var sums=tmReps.map(function(r){var s=summary(r.n);s.n=r.n;s.s=r.s;return s;});
              var act=sums.filter(function(r){return !r.s;});
              var T=act.reduce(function(s,r){return s+r.all.T;},0),A=act.reduce(function(s,r){return s+r.all.A;},0),tp=pct(A,T);
              var sorted2=act.slice().sort(function(a,b){return b.all.p-a.all.p;});
              var col=TCOL[tm]||"#1e3a8a";
              return <div key={tm} style={{background:"#fff",borderRadius:10,boxShadow:"0 1px 4px rgba(0,0,0,.1)",overflow:"hidden"}}>
                <div style={{background:col,color:"#fff",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:700}}>{tm}</span>
                  <span style={{fontSize:11,opacity:.85}}>{act.length+" active"+(tmReps.length>act.length?" · "+(tmReps.length-act.length)+" inactive":"")}</span>
                </div>
                <div style={{padding:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,background:"#f8fafc",borderRadius:7,padding:"7px 10px"}}>
                    <div style={{textAlign:"center"}}><div style={{fontSize:10,color:"#94a3b8",marginBottom:1}}>TARGET</div><div style={{fontWeight:700,fontSize:12}}>{fmtK(T)}</div></div>
                    <div style={{textAlign:"center"}}><div style={{fontSize:10,color:"#94a3b8",marginBottom:1}}>ACTUAL</div><div style={{fontWeight:700,fontSize:12,color:"#2563eb"}}>{fmtK(A)}</div></div>
                    <div style={{textAlign:"center"}}><div style={{fontSize:10,color:"#94a3b8",marginBottom:1}}>ATTAINMENT</div><div style={{fontWeight:700,fontSize:15,color:aC(tp)}}>{tp.toFixed(1)+"%"}</div></div>
                  </div>
                  {sums.map(function(r){return <div key={r.n} style={{marginBottom:7,opacity:r.s?0.45:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:2}}>
                      <span style={{fontWeight:500,display:"flex",alignItems:"center",gap:3}}>{r.n.split(" ")[0]}<Badge s={r.s}/></span>
                      <span style={{fontWeight:700,color:r.s?"#94a3b8":aC(r.all.p)}}>{r.all.p.toFixed(1)+"%"}</span>
                    </div>
                    <div style={{background:"#e2e8f0",borderRadius:3,height:6}}><div style={{width:Math.min(r.all.p,100)+"%",background:r.s?"#cbd5e1":aC(r.all.p),borderRadius:3,height:6}}/></div>
                  </div>;})}
                  {sorted2.length>1&&<div style={{marginTop:8,display:"flex",gap:6,fontSize:11}}>
                    <span style={{background:"#dcfce7",color:"#16a34a",padding:"2px 7px",borderRadius:20}}>🔝 {sorted2[0].n.split(" ")[0]}</span>
                    <span style={{background:"#fee2e2",color:"#dc2626",padding:"2px 7px",borderRadius:20}}>📉 {sorted2[sorted2.length-1].n.split(" ")[0]}</span>
                  </div>}
                </div>
              </div>;
            })}
          </div>
        </div>}

        {tab===5&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
            <b style={{color:"#1e3a8a",fontSize:15}}>⚡ Accelerator — Monthly Hit Tracker</b>
            <div style={{display:"flex",gap:10,fontSize:11,color:"#64748b"}}>
              <span>Click to cycle:</span><span style={{color:"#94a3b8"}}>— blank</span><span style={{color:"#16a34a"}}>✔ hit</span><span style={{color:"#dc2626"}}>✘ missed</span>
            </div>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",width:"100%",background:"#fff",borderRadius:8,boxShadow:"0 1px 3px rgba(0,0,0,.08)",fontSize:12}}>
              <thead><tr style={{background:"#1e3a8a",color:"#fff"}}>
                <th style={{padding:"8px 10px",textAlign:"left",minWidth:80}}>Segment</th>
                <th style={{padding:"8px 12px",textAlign:"left",minWidth:150}}>Rep</th>
                {MONTHS.map(function(m){return <th key={m} style={{padding:"8px 6px",textAlign:"center",minWidth:58}}>{m}</th>;})}
                <th style={{padding:"8px 8px",textAlign:"center",minWidth:55}}>Total ✔</th>
              </tr></thead>
              <tbody>{activeReps.map(function(r,i){
                var bg=i%2===0?"#f8fafc":"#fff";
                var hits=MONTHS.filter(function(m){return accel[r.n]&&accel[r.n][m]===true;}).length;
                return <tr key={r.n} style={{background:bg,borderBottom:"1px solid #e2e8f0"}}>
                  <td style={{padding:"7px 10px",color:"#64748b",fontSize:11,fontWeight:600}}>{SEGMAP[r.t]||r.t}</td>
                  <td style={{padding:"7px 12px",fontWeight:600}}>{r.n}</td>
                  {MONTHS.map(function(m){
                    var val=accel[r.n]?accel[r.n][m]:null;
                    return <td key={m} style={{padding:"3px 3px",textAlign:"center"}}>
                      <button onClick={function(){toggleAccel(r.n,m);}} style={{width:30,height:28,borderRadius:5,border:"none",cursor:"pointer",fontSize:14,fontWeight:700,background:val===true?"#dcfce7":val===false?"#fee2e2":"#f1f5f9",color:val===true?"#16a34a":val===false?"#dc2626":"#94a3b8"}}>{val===true?"✔":val===false?"✘":"—"}</button>
                    </td>;
                  })}
                  <td style={{padding:"7px 8px",textAlign:"center",fontWeight:700,color:hits>0?"#16a34a":"#94a3b8"}}>{hits}</td>
                </tr>;
              })}</tbody>
            </table>
          </div>
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
